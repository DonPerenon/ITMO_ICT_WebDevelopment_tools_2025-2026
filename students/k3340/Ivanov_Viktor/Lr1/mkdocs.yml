site_name: Иванов Виктор — Web Development Tools
site_url: https://donperenon.github.io/ITMO_ICT_WebDevelopment_tools_2025-2026
site_description: Лабораторные работы по курсу Web Development Tools (2025–2026), ИТМО, группа K3340
site_author: Иванов Виктор

docs_dir: docs
site_dir: site

theme:
  name: material
  language: ru
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Светлая тема
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search:
      lang: ru

nav:
  - Главная: index.md
  - Лабораторная работа 1:
    - Обзор: lr1/overview.md
    - Практика 1.1: lr1/practice1.md
    - Практика 1.2: lr1/practice2.md
    - Практика 1.3: lr1/practice3.md
    - Финальная сборка: lr1/final.md
    - Структура проекта: lr1/structure.md
    - Модели данных: lr1/models.md
    - Подключение к БД: lr1/database.md
    - Эндпоинты: lr1/endpoints.md
    - Авторизация и JWT: lr1/auth.md
